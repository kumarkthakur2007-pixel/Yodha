 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#050508"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="YODHA"/>
  <link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;YODHA&quot;,&quot;short_name&quot;:&quot;YODHA&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23050508&quot;,&quot;theme_color&quot;:&quot;%23050508&quot;}"/>
  <title>YODHA v5 — AI Warrior's Discipline</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    body{background:#030308;font-family:'Rajdhani',sans-serif;color:#eaeaf8;overscroll-behavior:none;transition:background .4s,color .4s;}
    /* RED ALERT MODE */
    body.red-alert{background:#0a0000 !important;}
    body.red-alert .card{background:#0d0000 !important;border-color:#3a0000 !important;}
    body.red-alert .nav{background:#0a0000 !important;}
    body.red-alert .header{background:linear-gradient(180deg,#120000 0%,#0a0000 100%) !important;}
    body.red-alert .header-glow{background:radial-gradient(ellipse at 50% 0%,#ff000033 0%,transparent 60%) !important;}
    @keyframes redPulse{0%{box-shadow:inset 0 0 0 2px #ff000000}50%{box-shadow:inset 0 0 0 2px #ff000055}100%{box-shadow:inset 0 0 0 2px #ff000000}}
    body.red-alert #app{animation:redPulse 2s ease infinite;}
    :root{--bg:#030308;--bg2:#0a0a12;--bg3:#10101a;--border:#1a1a2e;--accent:#ff2222;--text:#eaeaf8;--muted:#5050a0;--danger:#ff2244;--green:#39ff14;--gold:#ffd700;}
    #app{height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    .scanline{position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:9999;}
    /* HEADER — PREMIUM */
    .header{padding:clamp(10px,3vw,16px) clamp(12px,4vw,16px) 10px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0e0e1a 0%,#030308 100%);position:relative;overflow:hidden;flex-shrink:0;transition:background .4s;}
    .header-glow{position:absolute;top:-60%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 50% 0%,#ff222218 0%,transparent 60%);pointer-events:none;transition:background .4s;}
    .header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent)55,transparent);}
    .brand{font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,7.5vw,36px);letter-spacing:clamp(3px,1.8vw,8px);color:var(--accent);line-height:1;text-shadow:0 0 20px var(--accent)44;}
    .brand-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(6px,1.8vw,9px);letter-spacing:clamp(2px,1vw,4px);color:var(--muted);margin-top:1px;}
    .rank-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border:1px solid var(--accent);font-family:'Bebas Neue',sans-serif;font-size:clamp(11px,3.5vw,16px);letter-spacing:3px;color:var(--accent);margin-top:8px;background:linear-gradient(135deg,transparent,rgba(255,34,34,0.05));}
    .score-bar{height:2px;background:var(--border);margin-top:8px;border-radius:1px;}
    .score-fill{height:100%;background:var(--accent);transition:width .8s ease;box-shadow:0 0 8px var(--accent);border-radius:1px;}
    /* RED ALERT BANNER */
    .red-banner{display:none;background:linear-gradient(90deg,#110000,#1a0000,#110000);border-top:1px solid #ff000033;border-bottom:1px solid #ff000033;padding:6px 12px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:clamp(8px,2.2vw,10px);color:#ff4444;letter-spacing:2px;flex-shrink:0;}
    body.red-alert .red-banner{display:block;}
    /* NAV — PREMIUM */
    .nav{display:flex;border-top:1px solid var(--border);background:linear-gradient(180deg,#0a0a12,#030308);flex-shrink:0;}
    .nav-btn{flex:1;padding:10px 2px 6px;background:none;border:none;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:clamp(8px,2.3vw,10px);font-weight:600;letter-spacing:1px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .2s,background .2s;}
    .nav-btn.active{color:var(--accent);background:linear-gradient(180deg,rgba(255,34,34,0.06),transparent);}
    .nav-icon{font-size:clamp(14px,4vw,17px);}
    /* CONTENT */
    .content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
    .section{padding:14px;}
    /* CARDS — PREMIUM */
    .card{background:linear-gradient(135deg,#0d0d18,#0a0a12);border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:10px;transition:background .4s,border-color .4s;position:relative;overflow:hidden;}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent);}
    .card-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(14px,4.2vw,18px);letter-spacing:3px;color:var(--accent);margin-bottom:10px;}
    /* RING */
    .ring-wrap{position:relative;width:clamp(54px,15vw,68px);height:clamp(54px,15vw,68px);flex-shrink:0;}
    .ring-svg{transform:rotate(-90deg);}
    .ring-bg{fill:none;stroke:var(--border);stroke-width:4;}
    .ring-fg{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}
    .ring-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',sans-serif;font-size:clamp(12px,3.8vw,17px);color:var(--accent);}
    /* TASKS */
    .task-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
    .task-row:last-child{border-bottom:none;}
    .task-cat{font-family:'Share Tech Mono',monospace;font-size:clamp(7px,1.9vw,8px);color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
    .task-name{font-size:clamp(11px,3.3vw,13px);font-weight:600;color:var(--text);line-height:1.3;}
    .task-name.done{text-decoration:line-through;color:var(--muted);}
    .task-name.missed{color:var(--danger);}
    .task-locked{opacity:.35;pointer-events:none;}
    .lock-badge{font-size:9px;color:#888;font-family:'Share Tech Mono',monospace;margin-top:2px;padding:1px 5px;border:1px solid #33334455;display:inline-block;}
    .leak-tag{font-size:9px;color:var(--danger);font-family:'Share Tech Mono',monospace;margin-top:3px;padding:1px 5px;border:1px solid #ff224433;display:inline-block;}
    .mission-tag{font-size:9px;color:var(--gold);font-family:'Share Tech Mono',monospace;margin-top:3px;padding:1px 5px;border:1px solid #ffd70033;display:inline-block;}
    /* BUTTONS */
    .btn-check{width:28px;height:28px;border:1.5px solid var(--border);background:transparent;font-size:13px;color:#444;flex-shrink:0;margin-top:2px;cursor:pointer;border-radius:2px;transition:all .15s;}
    .btn-check.done{border-color:var(--accent);background:rgba(0,207,255,.1);color:var(--accent);}
    .btn-check.missed{border-color:var(--danger);background:rgba(255,34,34,.08);color:var(--danger);}
    .btn-miss{padding:3px 7px;font-size:9px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:1px;cursor:pointer;margin-left:auto;flex-shrink:0;border-radius:2px;}
    .btn-primary{width:100%;padding:13px;background:var(--accent);color:#000;font-family:'Rajdhani',sans-serif;font-size:clamp(12px,3.8vw,15px);font-weight:700;letter-spacing:2px;border:none;cursor:pointer;border-radius:2px;margin-top:6px;}
    .btn-primary:active{opacity:.85;}
    .btn-secondary{flex:1;padding:11px;background:transparent;color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:clamp(11px,3.2vw,13px);font-weight:700;letter-spacing:1px;border:1px solid var(--accent);cursor:pointer;border-radius:2px;}
    .btn-danger-outline{flex:1;padding:11px;background:transparent;color:var(--danger);font-family:'Rajdhani',sans-serif;font-size:clamp(11px,3.2vw,13px);font-weight:700;letter-spacing:1px;border:1px solid var(--danger);cursor:pointer;border-radius:2px;}
    /* DAY SELECTOR */
    .day-selector{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;scrollbar-width:none;}
    .day-selector::-webkit-scrollbar{display:none;}
    .day-btn{flex-shrink:0;width:38px;height:38px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:15px;cursor:pointer;position:relative;border-radius:2px;transition:all .2s;}
    .day-btn.active{border-color:var(--accent);color:var(--accent);}
    .day-btn.good{border-color:#39ff1455;color:var(--green);}
    .day-dot{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;}
    /* INPUTS */
    .input-group{margin-bottom:9px;}
    .input-label{font-family:'Share Tech Mono',monospace;font-size:clamp(7px,2vw,9px);letter-spacing:2px;color:var(--muted);margin-bottom:3px;display:block;}
    .input-field{width:100%;background:#13131e;border:1px solid var(--border);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:clamp(12px,3.3vw,14px);padding:9px 11px;border-radius:2px;}
    .input-field:focus{outline:none;border-color:var(--accent);}
    /* SPECIAL MISSION */
    .mission-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
    .mission-day-in{width:48px;background:#13131e;border:1px solid #ffd70044;color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:16px;padding:7px 6px;border-radius:2px;text-align:center;}
    .mission-day-in:focus{outline:none;border-color:var(--gold);}
    .mission-task-in{flex:1;background:#13131e;border:1px solid #ffd70044;color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:clamp(11px,3.2vw,13px);padding:7px 9px;border-radius:2px;}
    .mission-task-in:focus{outline:none;border-color:var(--gold);}
    .btn-rm{padding:5px 9px;background:transparent;border:1px solid #ff224433;color:var(--danger);font-size:12px;cursor:pointer;border-radius:2px;}
    .btn-add-m{width:100%;padding:10px;background:#ffd70011;border:1px solid #ffd70033;color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;cursor:pointer;border-radius:2px;margin-bottom:10px;}
    /* MODAL */
    .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);z-index:500;display:flex;align-items:flex-end;}
    .modal{background:#0d0d14;border-top:2px solid var(--danger);padding:18px 16px 36px;width:100%;max-height:80vh;overflow-y:auto;}
    .modal-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(17px,5vw,22px);letter-spacing:4px;color:var(--danger);margin-bottom:4px;}
    .modal-sub{font-size:clamp(8px,2.3vw,10px);color:var(--muted);margin-bottom:14px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;}
    .leak-btn{width:100%;padding:11px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:clamp(12px,3.3vw,14px);font-weight:600;letter-spacing:1px;cursor:pointer;margin-bottom:5px;text-align:left;border-radius:2px;}
    .leak-btn:active{border-color:var(--danger);color:var(--danger);}
    /* HARD RESET MODAL */
    .reset-modal{background:#0d0000;border-top:3px solid #ff0000;padding:20px 16px 40px;width:100%;}
    .reset-modal-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,6.5vw,28px);letter-spacing:4px;color:#ff0000;margin-bottom:8px;text-shadow:0 0 20px #ff000066;}
    /* STATS */
    .stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
    .stat-label{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,2.3vw,10px);color:var(--muted);letter-spacing:1px;}
    .stat-val{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,5.2vw,22px);color:var(--accent);letter-spacing:2px;}
    /* LEAK BARS */
    .leak-bar{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
    .leak-label{font-size:clamp(10px,3vw,12px);font-weight:600;min-width:clamp(100px,28vw,125px);}
    .leak-track{flex:1;height:5px;background:var(--border);}
    .leak-fill{height:100%;background:var(--danger);transition:width .6s ease;}
    .leak-count{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--danger);}
    /* WALL OF SHAME */
    .shame-card{background:#0d0000;border:1px solid #ff220022;border-radius:3px;padding:13px;margin-bottom:10px;}
    .shame-enemy{padding:10px;margin-bottom:8px;border:1px solid #ff000033;background:#0a0000;display:flex;align-items:center;justify-content:space-between;}
    .shame-rank-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:#ff0000;letter-spacing:2px;margin-bottom:3px;}
    .shame-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(16px,4.8vw,20px);color:#ff3333;letter-spacing:3px;}
    .aukaat-badge{font-family:'Share Tech Mono',monospace;font-size:9px;color:#000;background:#ff2244;padding:2px 7px;border-radius:1px;letter-spacing:1px;}
    /* RANK CARDS */
    .rank-card{padding:11px 13px;border:1px solid;border-radius:2px;display:flex;align-items:center;gap:11px;margin-bottom:7px;}
    .rank-card.current{border-width:2px;}
    .rank-icon-big{font-size:clamp(20px,6vw,26px);flex-shrink:0;}
    .rank-name-big{font-family:'Bebas Neue',sans-serif;font-size:clamp(16px,4.8vw,20px);letter-spacing:3px;line-height:1;}
    .rank-sub-sm{font-size:clamp(8px,2.3vw,10px);letter-spacing:1px;margin-top:1px;opacity:.85;font-family:'Rajdhani',monospace;font-style:italic;color:#aaa;}
    .rank-badge{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,2.3vw,10px);margin-left:auto;opacity:.7;}
    /* TOAST */
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-family:'Bebas Neue',sans-serif;font-size:clamp(12px,3.5vw,16px);letter-spacing:2px;padding:10px 16px;border-radius:2px;z-index:800;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:92vw;text-align:center;}
    .toast.show{opacity:1;}
    /* INSULT TOAST */
    .toast.insult{background:#1a0000;color:#ff4444;border:1px solid #ff222255;font-size:clamp(10px,3vw,13px);letter-spacing:1px;white-space:normal;text-align:center;max-width:88vw;line-height:1.4;}
    /* MISC */
    .divider{height:1px;background:var(--border);margin:14px 0;}
    .sec-label{font-family:'Share Tech Mono',monospace;font-size:clamp(7px,2vw,9px);letter-spacing:3px;color:var(--muted);margin-bottom:10px;}
    .warn-box{background:#13131e;border:1px solid var(--border);padding:11px;margin-bottom:10px;}
    .warn-title{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:5px;}
    .data-row{display:flex;gap:8px;margin-top:8px;}
    /* EXPORT STRING */
    .export-string{width:100%;background:#13131e;border:1px solid var(--border);color:#39ff14;font-family:'Share Tech Mono',monospace;font-size:11px;padding:10px;border-radius:2px;resize:none;height:80px;margin-top:8px;}
    /* TOGGLE */
    .toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:8px 0;}
    .toggle-track{width:40px;height:22px;background:var(--border);border-radius:11px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
    .toggle-track.on{background:var(--accent);}
    .toggle-thumb{width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .2s;}
    .toggle-track.on .toggle-thumb{left:21px;}
    #importFile{display:none;}
    /* ALARM LOCK SCREEN — PREMIUM v6 */
    .alarm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,#030008 0%,#0a0000 60%,#030008 100%);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
    .alarm-bg-grid{position:absolute;top:0;left:0;right:0;bottom:0;background-image:linear-gradient(rgba(255,34,34,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,34,34,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
    .alarm-bg-radial{position:absolute;top:20%;left:50%;transform:translateX(-50%);width:300px;height:300px;background:radial-gradient(circle,#ff000022 0%,transparent 70%);pointer-events:none;animation:radialPulse 1s ease infinite;}
    @keyframes radialPulse{0%,100%{opacity:.5;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.15)}}
    .alarm-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,11vw,56px);letter-spacing:6px;color:#ff2222;text-shadow:0 0 40px #ff000099,0 0 80px #ff000044;animation:alarmPulse 0.6s ease infinite;position:relative;z-index:1;}
    @keyframes alarmPulse{0%,100%{opacity:1;text-shadow:0 0 40px #ff000099,0 0 80px #ff000044}50%{opacity:.75;text-shadow:0 0 80px #ff0000cc,0 0 120px #ff000066}}
    .alarm-time{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,19vw,96px);letter-spacing:4px;color:#fff;line-height:1;margin:6px 0;text-shadow:0 0 30px #ffffff33;position:relative;z-index:1;}
    .alarm-time-ampm{font-size:clamp(18px,5vw,28px);color:#ff4444;letter-spacing:2px;margin-left:6px;}
    .alarm-label{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.5vw,12px);color:#666;letter-spacing:4px;margin-bottom:20px;position:relative;z-index:1;}
    /* Premium alarm box */
    .alarm-lock-box{background:rgba(13,0,0,0.92);border:1px solid #ff222255;padding:18px 16px;width:100%;max-width:380px;border-radius:6px;position:relative;z-index:2;backdrop-filter:blur(10px);}
    .alarm-lock-box::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,#ff2222,transparent);}
    .alarm-lock-box::after{content:'';position:absolute;bottom:0;left:30%;right:30%;height:1px;background:linear-gradient(90deg,transparent,#ff222266,transparent);}
    .alarm-challenge-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(13px,3.8vw,17px);letter-spacing:3px;color:#ff4444;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .alarm-challenge-q{font-family:'Share Tech Mono',monospace;font-size:clamp(15px,4.5vw,21px);color:#fff;text-align:center;padding:13px;background:linear-gradient(135deg,#1a0000,#0d0008);margin:8px 0;border-radius:4px;letter-spacing:1px;border:1px solid #ff222233;}
    .alarm-input{width:100%;background:#0d0d14;border:1px solid #ff222266;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,5.5vw,24px);padding:12px;text-align:center;letter-spacing:2px;border-radius:4px;margin-bottom:10px;transition:border-color .2s,box-shadow .2s;}
    .alarm-input:focus{outline:none;border-color:#ff2222;box-shadow:0 0 12px #ff222233;}
    .alarm-submit{width:100%;padding:14px;background:linear-gradient(135deg,#cc0000,#ff2222);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:clamp(14px,4.5vw,18px);letter-spacing:3px;border:none;cursor:pointer;border-radius:4px;box-shadow:0 4px 20px #ff222244;transition:transform .1s;}
    .alarm-submit:active{transform:scale(.98);}
    .alarm-error{color:#ff6666;font-family:'Share Tech Mono',monospace;font-size:11px;text-align:center;margin-top:6px;min-height:16px;letter-spacing:1px;}
    .alarm-tab-type{display:flex;gap:6px;margin-bottom:12px;}
    .alarm-tab-btn{flex:1;padding:8px 4px;background:transparent;border:1px solid #ff222233;color:#555;font-family:'Bebas Neue',sans-serif;font-siz
